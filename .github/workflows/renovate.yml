name: Renovate
on:
  # Daily at 3am.
  schedule:
    - cron: "0 3 * * *"
  # Also allow manual trigger.
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: renovatebot/github-action@v46
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
